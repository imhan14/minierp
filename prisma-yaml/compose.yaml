services:
  pg-minierp:
    container_name: pg-minierp
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nqh200100
      POSTGRES_DB: minierp_db
    ports:
      - "5432:5432"
    restart: always
      
  pgadmin-minierp:
    container_name: pgadmin-minierp
    image: dpage/pgadmin4:latest
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: nqh200100